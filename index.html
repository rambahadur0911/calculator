<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style1.css">
</head>
<body>
    <div class="container">
        <div><h1><u><i>Calculator</i></u></h1></div>
        <div class="calculator">
            <input type="text" id="display" disabled>
            <div class="buttons">
                <button >7</button>
                <button >8</button>
                <button >9</button>
                <button id="clear">C</button>
                <button >4</button>
                <button >5</button>
                <button >6</button>
                <button id="back">X</button>
                <button >1</button>
                <button >2</button>
                <button>3</button>
                <button >-</button>
                <button >0</button>
                <button >.</button>
                <button >=</button>
                <button >+</button>
                <button >%</button>
                <button >^</button>
                <button >/</button>
                <button >*</button>
            </div>
         </div>
    </div>
    <script src="calc.js"></script>
</body>
</html>
